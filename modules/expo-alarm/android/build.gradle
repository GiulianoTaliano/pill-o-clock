apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'expo.modules.alarm'
version = '1.0.0'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  compileSdk safeExtGet('compileSdk', 36)

  namespace 'expo.modules.alarm'

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 24)
    targetSdk safeExtGet('targetSdk', 36)
    versionCode 1
    versionName '1.0.0'
  }

  buildFeatures {
    buildConfig false
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = JavaVersion.VERSION_17.majorVersion
  }

  // Allows the module to be used in non-modular projects
  libraryVariants.all { variant ->
    variant.outputs.each { output ->
      output.outputFileName = "expo-alarm.aar"
    }
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation project(':expo-modules-core')
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:${safeExtGet('kotlinVersion', '1.9.0')}"
  implementation "androidx.core:core-ktx:1.13.1"
}
